<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secret Image Unlock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }

        .secretImage {
            display: none;
            max-width: 300px;
            margin: 20px auto;   /* centers the image */
            display: block;      /* required for auto-centering */
        }
    </style>
</head>
<body>

    <h2>Enter the secret code</h2>

    <input type="text" id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Submit</button>

    <p id="message"></p>

    <!-- Images for Q1–Q7 -->
    <img id="q1" class="secretImage" src="Q1.png" alt="Q1 Image">
    <img id="q2" class="secretImage" src="Q2.png" alt="Q2 Image">
    <img id="q3" class="secretImage" src="Q3.png" alt="Q3 Image">
    <img id="q4" class="secretImage" src="Q4.png" alt="Q4 Image">
    <img id="q5" class="secretImage" src="Q5.png" alt="Q5 Image">
    <img id="q6" class="secretImage" src="Q6.png" alt="Q6 Image">
    <img id="q7" class="secretImage" src="Q7.png" alt="Q7 Image">

    <script>
        // All accepted answers mapped to their images
        const answerMap = {
            "west": "q1",
            "7": "q2",
            "seven": "q2",
            "18": "q3",
            "92": "q4",
            "32": "q5",
            "1960": "q6",
            "ireland": "q7",
            "irish": "q7"
        };

        function checkCode() {
            const userCode = document.getElementById("codeInput").value.trim().toLowerCase();
            const message = document.getElementById("message");

            // Hide all images
            document.querySelectorAll(".secretImage").forEach(img => img.style.display = "none");

            // Check if answer matches
            if (answerMap[userCode]) {
                const imageId = answerMap[userCode];
                document.getElementById(imageId).style.display = "block";
                message.textContent = "Correct!";
            } else {
                message.textContent = "Incorrect code.";
            }
        }
    </script>

</body>
</html>
